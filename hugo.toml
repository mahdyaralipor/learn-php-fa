baseURL = 'https://mahdyaralipor.github.io/learn-php-fa/'
title = 'آموزش PHP از صفر'
theme = 'hugo-book'

[languages]
  [languages.fa]
    languageName = 'فارسی'
    languageCode = 'fa-ir'
    weight = 1
    contentDir = 'content'
    direction = 'rtl'

[params]
  BookTheme = 'auto'
  BookToC = true
  BookSection = 'lessons'
  BookRepo = 'https://github.com/Mahdyaralipor/learn-php-fa'
  BookEditPath = 'edit/main'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
